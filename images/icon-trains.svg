<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Chip body -->
  <rect x="21" y="21" width="38" height="38" rx="5" fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.88" stroke-width="2"/>
  <!-- Left pins -->
  <line x1="21" y1="30" x2="11" y2="30" stroke="white" stroke-opacity="0.8" stroke-width="2"   stroke-linecap="round"/>
  <line x1="21" y1="40" x2="11" y2="40" stroke="white" stroke-opacity="0.8" stroke-width="2"   stroke-linecap="round"/>
  <line x1="21" y1="50" x2="11" y2="50" stroke="white" stroke-opacity="0.8" stroke-width="2"   stroke-linecap="round"/>
  <!-- Right pins -->
  <line x1="59" y1="30" x2="69" y2="30" stroke="white" stroke-opacity="0.8" stroke-width="2"   stroke-linecap="round"/>
  <line x1="59" y1="40" x2="69" y2="40" stroke="white" stroke-opacity="0.8" stroke-width="2"   stroke-linecap="round"/>
  <line x1="59" y1="50" x2="69" y2="50" stroke="white" stroke-opacity="0.8" stroke-width="2"   stroke-linecap="round"/>
  <!-- Top pins -->
  <line x1="30" y1="21" x2="30" y2="11" stroke="white" stroke-opacity="0.8" stroke-width="2"   stroke-linecap="round"/>
  <line x1="40" y1="21" x2="40" y2="11" stroke="white" stroke-opacity="0.8" stroke-width="2"   stroke-linecap="round"/>
  <line x1="50" y1="21" x2="50" y2="11" stroke="white" stroke-opacity="0.8" stroke-width="2"   stroke-linecap="round"/>
  <!-- Bottom pins -->
  <line x1="30" y1="59" x2="30" y2="69" stroke="white" stroke-opacity="0.8" stroke-width="2"   stroke-linecap="round"/>
  <line x1="40" y1="59" x2="40" y2="69" stroke="white" stroke-opacity="0.8" stroke-width="2"   stroke-linecap="round"/>
  <line x1="50" y1="59" x2="50" y2="69" stroke="white" stroke-opacity="0.8" stroke-width="2"   stroke-linecap="round"/>
  <!-- Inner die -->
  <rect x="29" y="29" width="22" height="22" rx="3" fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.5" stroke-width="1.5"/>
  <!-- Cross detail -->
  <line x1="40" y1="29" x2="40" y2="51" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="29" y1="40" x2="51" y2="40" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
  <circle cx="40" cy="40" r="3" fill="white" fill-opacity="0.55"/>
</svg>
