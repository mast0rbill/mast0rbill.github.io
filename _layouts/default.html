<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="icon" href="{{ '/images/Profile_New.jpg' | relative_url }}">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="{{ '/style.css' | relative_url }}" rel="stylesheet">
</head>
<body>

<div class="cursor-glow" id="cursor-glow"></div>

  <nav class="term-nav" id="site-nav">
    <div class="term-nav-inner">
      <a href="{{ '/' | relative_url }}" class="term-nav-logo">WILLIAM LIU</a>
      <div class="term-nav-links">
        <a href="{{ '/' | relative_url }}#projects">PROJECTS</a>
        <a href="{{ '/' | relative_url }}#experience">EXPERIENCE</a>
        <a href="{{ '/' | relative_url }}#education">EDUCATION</a>
        <a href="{{ '/resume' | relative_url }}" class="term-nav-cta">RESUME</a>
      </div>
    </div>
  </nav>

  {{ content }}

  <footer class="term-footer">
    <div class="term-footer-inner">
      <p class="footer-sig">William Liu - 2026</p>
      <div class="term-footer-links">
        <a href="https://github.com/mast0rbill/" target="_blank" rel="noopener">GITHUB</a>
        <span class="pipe">|</span>
        <a href="https://www.linkedin.com/in/williamyuxuanliu/" target="_blank" rel="noopener">LINKEDIN</a>
      </div>
    </div>
  </footer>

  <script src="{{ '/js/main.js' | relative_url }}"></script>
</body>
</html>
