<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="icon" href="{{ '/images/Profile.jpg' | relative_url }}">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="{{ '/css/bootstrap.min.css' | relative_url }}" rel="stylesheet">
  <link href="{{ '/style.css' | relative_url }}" rel="stylesheet">
</head>
<body>

  <div class="site-nav" id="site-nav">
    <div class="site-nav-inner">
      <a href="{{ '/' | relative_url }}" class="site-nav-logo">William Liu</a>
      <div class="site-nav-links">
        <a href="{{ '/' | relative_url }}#experience">Experience</a>
        <a href="{{ '/' | relative_url }}#projects">Projects</a>
        <a href="{{ '/resume' | relative_url }}" class="site-nav-cta">Résumé</a>
      </div>
    </div>
  </div>

  {{ content }}

  <footer class="site-footer">
    <div class="footer-inner">
      <p>Designed &amp; built by William Liu</p>
      <div class="footer-links">
        <a href="https://github.com/mast0rbill/" target="_blank" rel="noopener">GitHub</a>
        <a href="https://www.linkedin.com/in/william-l-21654611a/" target="_blank" rel="noopener">LinkedIn</a>
      </div>
    </div>
  </footer>

  <script src="{{ '/js/bootstrap.bundle.min.js' | relative_url }}"></script>
  <script src="{{ '/js/main.js' | relative_url }}"></script>
</body>
</html>
